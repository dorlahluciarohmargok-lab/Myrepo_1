server:
  port: 8080

spring:
  application:
    name: pomodoro-backend

  # MySQL 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/pomodoro_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Redis 缓存配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# JWT 配置
jwt:
  secret: pomodoro-app-secret-key-2024-very-long-secret-key-for-security
  expiration: 86400000  # 24小时（毫秒）

# 日志配置
logging:
  level:
    com.pomodoro: DEBUG
    org.springframework.data.redis: DEBUG
