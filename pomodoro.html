<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FF6347">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="番茄专注">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍅</text></svg>">
<title>番茄专注 - Pomodoro Focus</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #FF6347;
  --primary-light: #FF8A75;
  --primary-dark: #E5533A;
  --secondary: #FFE4E1;
  --accent: #2C3E50;
  --bg-light: #FFF9F8;
  --card-bg: #FFFFFF;
  --text-primary: #2C3E50;
  --text-secondary: #7F8C8D;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --radius: 16px;
  --nav-height: 64px;
}

html, body {
  height: 100%;
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg-light);
  color: var(--text-primary);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.app-container {
  position: relative;
  width: 100%;
  max-width: 430px;
  height: 100vh;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  z-index: 1;
  transition: background 2s ease;
}

/* Dynamic background */
.bg-morning { background: linear-gradient(180deg, #FFF5F0 0%, #FFE8E0 100%); }
.bg-afternoon { background: linear-gradient(180deg, #FFF9F8 0%, #FFE4E1 100%); }
.bg-evening { background: linear-gradient(180deg, #F8F0FF 0%, #FFE4F0 100%); }
.bg-night { background: linear-gradient(180deg, #2C3E50 0%, #34495E 100%); }
.bg-night { --text-primary: #ECF0F1; --text-secondary: #BDC3C7; --card-bg: rgba(255,255,255,0.08); }

/* Header */
.header {
  padding: 12px 20px 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header-date {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
}
.weather-widget {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--text-secondary);
  background: var(--card-bg);
  padding: 6px 12px;
  border-radius: 20px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.weather-icon { font-size: 18px; }

/* Main content area */
.main-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: var(--nav-height);
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}

/* Views */
.view {
  display: none;
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 0.3s ease, transform 0.3s ease;
  padding: 0 20px 20px;
  min-height: calc(100vh - var(--nav-height) - 50px);
}
.view.active {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

/* Timer View */
.timer-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 16px;
}

.timer-modes {
  display: flex;
  background: var(--secondary);
  border-radius: 25px;
  padding: 4px;
  margin-bottom: 28px;
  gap: 2px;
}
.timer-mode-btn {
  padding: 8px 18px;
  border: none;
  border-radius: 22px;
  font-size: 13px;
  font-weight: 500;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
  background: transparent;
  color: var(--text-secondary);
  transition: all 0.3s ease;
  min-width: 44px;
  min-height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.timer-mode-btn.active {
  background: var(--primary);
  color: white;
  box-shadow: 0 2px 12px rgba(255,99,71,0.3);
}

/* Circular Timer */
.timer-circle-wrapper {
  position: relative;
  width: 220px;
  height: 220px;
  margin: 10px 0 24px;
}
.timer-svg {
  width: 220px;
  height: 220px;
  transform: rotate(-90deg);
}
.timer-bg-circle {
  fill: none;
  stroke: var(--secondary);
  stroke-width: 8;
}
.timer-progress-circle {
  fill: none;
  stroke: var(--primary);
  stroke-width: 8;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.5s ease;
  will-change: stroke-dashoffset;
}
.timer-display {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.timer-time {
  font-family: 'Nunito', sans-serif;
  font-size: 42px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -1px;
}
.timer-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}

/* Timer duration selector */
.duration-selector {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  justify-content: center;
}
.duration-btn {
  padding: 6px 14px;
  border: 1.5px solid var(--secondary);
  border-radius: 20px;
  font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
  background: var(--card-bg);
  color: var(--text-secondary);
  transition: all 0.2s ease;
  min-height: 36px;
}
.duration-btn.active {
  border-color: var(--primary);
  color: var(--primary);
  background: var(--secondary);
}
.custom-duration-input {
  width: 80px;
  padding: 6px 10px;
  border: 1.5px solid var(--secondary);
  border-radius: 20px;
  font-size: 12px;
  text-align: center;
  outline: none;
  font-family: 'Nunito', sans-serif;
}
.custom-duration-input:focus { border-color: var(--primary); }

/* Controls */
.timer-controls {
  display: flex;
  gap: 16px;
  margin-bottom: 28px;
}
.control-btn {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  transition: all 0.2s ease;
  will-change: transform;
}
.control-btn:active { transform: scale(0.92); }
.control-btn-primary {
  background: var(--primary);
  color: white;
  box-shadow: 0 4px 16px rgba(255,99,71,0.35);
}
.control-btn-primary:hover { background: var(--primary-dark); }
.control-btn-secondary {
  background: var(--card-bg);
  color: var(--text-secondary);
  box-shadow: var(--shadow);
}

/* Quote */
.quote-card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 16px 20px;
  box-shadow: var(--shadow);
  text-align: center;
  margin: 0 0 20px;
  width: 100%;
}
.quote-text {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text-primary);
  font-weight: 400;
}
.quote-author {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 8px;
}

/* Todo View */
.todo-section { padding-top: 10px; }
.todo-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.todo-title {
  font-size: 20px;
  font-weight: 700;
}
.todo-count {
  font-size: 12px;
  color: var(--text-secondary);
  background: var(--secondary);
  padding: 4px 10px;
  border-radius: 12px;
}

.todo-add-form {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
}
.todo-add-form-row {
  display: flex;
  gap: 8px;
  align-items: center;
}
.todo-title-input {
  flex: 1;
  padding: 10px 14px;
  border: 1.5px solid var(--secondary);
  border-radius: 12px;
  font-size: 14px;
  font-family: 'Noto Sans SC', sans-serif;
  outline: none;
  background: var(--card-bg);
  transition: border-color 0.2s;
}
.todo-title-input:focus { border-color: var(--primary); }
.todo-content-input {
  width: 100%;
  padding: 10px 14px;
  border: 1.5px solid var(--secondary);
  border-radius: 12px;
  font-size: 13px;
  font-family: 'Noto Sans SC', sans-serif;
  outline: none;
  background: var(--card-bg);
  transition: border-color 0.2s;
  resize: vertical;
  min-height: 60px;
  line-height: 1.5;
}
.todo-content-input:focus { border-color: var(--primary); }
.todo-time-input {
  width: 90px;
  padding: 10px 10px;
  border: 1.5px solid var(--secondary);
  border-radius: 12px;
  font-size: 13px;
  font-family: 'Nunito', sans-serif;
  outline: none;
  background: var(--card-bg);
  text-align: center;
}
.todo-time-input:focus { border-color: var(--primary); }
.todo-add-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: none;
  background: var(--primary);
  color: white;
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 3px 12px rgba(255,99,71,0.3);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.todo-add-btn:active { transform: scale(0.9); }

.todo-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.todo-item {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 14px 16px;
  box-shadow: var(--shadow);
  animation: slideIn 0.3s ease forwards;
  opacity: 0;
  transform: translateX(-10px);
  transition: all 0.3s ease;
}
.todo-item.completed {
  opacity: 0.6;
}
.todo-item.completed .todo-item-title {
  text-decoration: line-through;
  color: var(--text-secondary);
}
@keyframes slideIn {
  to { opacity: 1; transform: translateX(0); }
}
.todo-item-header {
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
}
.todo-checkbox {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 2px solid var(--secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  flex-shrink: 0;
}
.todo-checkbox.checked {
  background: var(--primary);
  border-color: var(--primary);
}
.todo-checkbox.checked::after {
  content: '✓';
  color: white;
  font-size: 12px;
  font-weight: 700;
}
.todo-item-info { flex: 1; min-width: 0; }
.todo-item-title {
  font-size: 15px;
  font-weight: 600;
  transition: all 0.3s ease;
  word-break: break-word;
  color: var(--text-primary);
}
.todo-item-due {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 3px;
  font-family: 'Nunito', sans-serif;
}
.todo-item-due.overdue { color: var(--primary); font-weight: 600; }
.todo-item-due.upcoming { color: #27AE60; }
.todo-expand-indicator {
  font-size: 12px;
  color: var(--text-secondary);
  transition: transform 0.3s ease;
  flex-shrink: 0;
}
.todo-item.expanded .todo-expand-indicator {
  transform: rotate(180deg);
}
.todo-delete-btn {
  width: 28px;
  height: 28px;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 16px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.todo-delete-btn:hover { background: var(--secondary); color: var(--primary); }

/* Expanded content area */
.todo-item-expanded {
  display: none;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--secondary);
}
.todo-item.expanded .todo-item-expanded {
  display: block;
}
.todo-expanded-toolbar {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 8px;
}
.todo-toggle-edit-btn {
  font-size: 12px;
  padding: 4px 12px;
  border: 1px solid var(--secondary);
  border-radius: 10px;
  background: var(--card-bg);
  color: var(--text-secondary);
  cursor: pointer;
  font-family: 'Noto Sans SC', sans-serif;
  transition: all 0.2s;
}
.todo-toggle-edit-btn:hover {
  border-color: var(--primary);
  color: var(--primary);
}
.todo-markdown-view {
  background: #f8f9fa;
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 14px;
  line-height: 1.7;
  color: var(--text-primary);
  word-break: break-word;
}
.todo-edit-area {
  display: none;
}
.todo-edit-textarea {
  width: 100%;
  min-height: 80px;
  padding: 12px 14px;
  border: 1.5px solid var(--secondary);
  border-radius: 12px;
  font-size: 13px;
  font-family: 'Noto Sans SC', sans-serif;
  outline: none;
  background: var(--card-bg);
  resize: vertical;
  line-height: 1.5;
  transition: border-color 0.2s;
}
.todo-edit-textarea:focus { border-color: var(--primary); }
.todo-edit-save-btn {
  margin-top: 8px;
  padding: 6px 16px;
  border: none;
  border-radius: 10px;
  background: var(--primary);
  color: white;
  font-size: 12px;
  font-family: 'Noto Sans SC', sans-serif;
  cursor: pointer;
  transition: background 0.2s;
}
.todo-edit-save-btn:hover { background: var(--primary-dark); }

/* Markdown rendered styles */
.todo-markdown-view h1 { font-size: 20px; font-weight: 700; margin: 12px 0 8px; }
.todo-markdown-view h2 { font-size: 18px; font-weight: 700; margin: 10px 0 6px; }
.todo-markdown-view h3 { font-size: 16px; font-weight: 600; margin: 8px 0 4px; }
.todo-markdown-view h4 { font-size: 15px; font-weight: 600; margin: 8px 0 4px; }
.todo-markdown-view h5 { font-size: 14px; font-weight: 600; margin: 6px 0 3px; }
.todo-markdown-view h6 { font-size: 13px; font-weight: 600; margin: 6px 0 3px; color: var(--text-secondary); }
.todo-markdown-view p { margin: 6px 0; }
.todo-markdown-view strong { font-weight: 700; }
.todo-markdown-view em { font-style: italic; }
.todo-markdown-view del { text-decoration: line-through; color: var(--text-secondary); }
.todo-markdown-view a { color: var(--primary); text-decoration: none; border-bottom: 1px solid var(--primary-light); }
.todo-markdown-view a:hover { color: var(--primary-dark); }
.todo-markdown-view code {
  background: #e9ecef;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  font-size: 12px;
}
.todo-markdown-view pre {
  background: #e9ecef;
  border-radius: 8px;
  padding: 12px 14px;
  overflow-x: auto;
  margin: 8px 0;
}
.todo-markdown-view pre code {
  background: none;
  padding: 0;
  font-size: 12px;
  line-height: 1.5;
}
.todo-markdown-view blockquote {
  border-left: 3px solid var(--primary-light);
  padding-left: 12px;
  margin: 8px 0;
  color: var(--text-secondary);
  font-style: italic;
}
.todo-markdown-view ul, .todo-markdown-view ol {
  padding-left: 20px;
  margin: 6px 0;
}
.todo-markdown-view li { margin: 3px 0; }
.todo-markdown-view ul.task-list {
  list-style: none;
  padding-left: 0;
}
.todo-markdown-view ul.task-list li {
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.todo-markdown-view ul.task-list li input[type="checkbox"] {
  margin-top: 4px;
  accent-color: var(--primary);
}
.todo-markdown-view img {
  max-width: 100%;
  border-radius: 8px;
  margin: 6px 0;
}
.todo-markdown-view hr {
  border: none;
  border-top: 1px solid var(--secondary);
  margin: 12px 0;
}

/* Mood View */
.mood-section { padding-top: 10px; }
.mood-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
}
.mood-subtitle {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 24px;
}
.mood-selector {
  display: flex;
  justify-content: space-around;
  margin-bottom: 32px;
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 20px 12px;
  box-shadow: var(--shadow);
}
.mood-option {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  padding: 8px;
  border-radius: 12px;
  transition: all 0.2s;
  min-width: 44px;
  min-height: 44px;
}
.mood-option:hover { background: var(--secondary); }
.mood-option.selected { background: var(--secondary); transform: scale(1.1); }
.mood-emoji { font-size: 32px; }
.mood-label { font-size: 11px; color: var(--text-secondary); }

.mood-history-title {
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 14px;
}
.mood-history {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 16px;
  box-shadow: var(--shadow);
}
.mood-day {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.mood-day-label {
  font-size: 10px;
  color: var(--text-secondary);
}
.mood-day-emoji { font-size: 20px; }

/* About View */
.about-section {
  padding-top: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
.about-logo {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin-bottom: 16px;
  box-shadow: 0 8px 24px rgba(255,99,71,0.25);
}
.about-name {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
}
.about-version {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 24px;
}
.about-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
  max-width: 280px;
  margin-bottom: 32px;
}
.about-features {
  width: 100%;
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  text-align: left;
}
.about-feature-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--secondary);
}
.about-feature-item:last-child { border-bottom: none; }
.about-feature-icon { font-size: 20px; }
.about-feature-text { font-size: 13px; color: var(--text-secondary); }

/* Bottom Navigation */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  height: var(--nav-height);
  background: var(--card-bg);
  display: flex;
  align-items: center;
  justify-content: space-around;
  box-shadow: 0 -2px 20px rgba(0,0,0,0.06);
  z-index: 100;
  border-radius: 20px 20px 0 0;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  padding: 8px 16px;
  border-radius: 12px;
  transition: all 0.2s;
  min-width: 44px;
  min-height: 44px;
  justify-content: center;
}
.nav-item.active .nav-icon { color: var(--primary); }
.nav-item.active .nav-label { color: var(--primary); font-weight: 600; }
.nav-icon {
  font-size: 22px;
  color: var(--text-secondary);
  transition: color 0.2s;
}
.nav-label {
  font-size: 10px;
  color: var(--text-secondary);
  transition: all 0.2s;
}

/* Scrollbar */
.main-content::-webkit-scrollbar { width: 0; }

/* Responsive tweaks */
@media (max-height: 700px) {
  .timer-circle-wrapper { width: 180px; height: 180px; }
  .timer-svg { width: 180px; height: 180px; }
  .timer-time { font-size: 34px; }
}
</style>
</head>
<body>
<div class="app-container" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-date" id="headerDate"></div>
    <div class="weather-widget" id="weatherWidget">

<script>
// ========== QUOTES ==========
const quotes = [

  {text: '不经一番寒彻骨，怎得梅花扑鼻香。', author: '黄檗禅师'},

  {text: '长风破浪会有时，直挂云帆济沧海。', author: '李白'},
  {text: '穷且益坚，不坠青云之志。', author: '王勃'},
  {text: '海纳百川，有容乃大。', author: '林则徐'},
  {text: '博观而约取，厚积而薄发。', author: '苏轼'},
  {text: '纸上得来终觉浅，绝知此事要躬行。', author: '陆游'},
  {text: '人生在勤，不索何获。', author: '张衡'},
  {text: '莫等闲，白了少年头，空悲切。', author: '岳飞'},
  {text: '天将降大任于斯人也，必先苦其心志。', author: '孟子'},
  {text: '功崇惟志，业广惟勤。', author: '尚书'},
  {text: '行动是治愈恐惧的良药。', author: '戴尔·卡耐基'},
  {text: '成功不是终点，失败不是末日，勇气才是关键。', author: '丘吉尔'},
  {text: '每一个不曾起舞的日子，都是对生命的辜负。', author: '尼采'}
];

// ========== STATE ==========
let timerMode = 'countdown'; // countdown, stopwatch, clock
let timerState = 'stopped'; // stopped, running, paused
let timerDuration = 25 * 60; // seconds
let timerRemaining = 25 * 60;
let stopwatchElapsed = 0;
let timerInterval = null;
let currentQuoteIndex = 0;
let todos = JSON.parse(localStorage.getItem('pomodoro_todos') || '[]');
let moodData = JSON.parse(localStorage.getItem('pomodoro_moods') || '{}');

// ========== DOM ELEMENTS ==========
const progressCircle = document.getElementById('progressCircle');
const timerTimeEl = document.getElementById('timerTime');
const timerLabelEl = document.getElementById('timerLabel');
const btnStartPause = document.getElementById('btnStartPause');
const btnReset = document.getElementById('btnReset');
const durationSelector = document.getElementById('durationSelector');
const customDurationInput = document.getElementById('customDuration');

// ========== NAVIGATION ==========
document.querySelectorAll('.nav-item').forEach(item => {
  item.addEventListener('click', () => {
    const viewId = item.dataset.view;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    item.classList.add('active');
    document.querySelectorAll('.view').forEach(v => {
      v.classList.remove('active');
      v.style.display = 'none';
    });
    const target = document.getElementById(viewId);
    target.style.display = 'block';
    requestAnimationFrame(() => target.classList.add('active'));
  });
});

// ========== TIMER MODES ==========
document.querySelectorAll('.timer-mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.timer-mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    switchTimerMode(btn.dataset.mode);
  });
});

function switchTimerMode(mode) {
  stopTimer();
  timerMode = mode;
  timerState = 'stopped';
  btnStartPause.textContent = '▶';

  if (mode === 'countdown') {
    durationSelector.style.display = 'flex';
    timerRemaining = timerDuration;
    updateTimerDisplay(timerRemaining);
    updateProgress(1);
    timerLabelEl.textContent = '专注时间';
  } else if (mode === 'stopwatch') {
    durationSelector.style.display = 'none';
    stopwatchElapsed = 0;
    updateTimerDisplay(0);
    updateProgress(0);
    timerLabelEl.textContent = '正向计时';
  } else if (mode === 'clock') {
    durationSelector.style.display = 'none';
    timerLabelEl.textContent = '当前时间';
    updateClockDisplay();
    btnStartPause.style.display = 'none';
    btnReset.style.display = 'none';
    startClock();
    return;
  }
  btnStartPause.style.display = 'flex';
  btnReset.style.display = 'flex';
}

// ========== DURATION SELECTOR ==========
document.querySelectorAll('.duration-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    customDurationInput.value = '';
    const mins = parseInt(btn.dataset.minutes);
    timerDuration = mins * 60;
    timerRemaining = timerDuration;
    updateTimerDisplay(timerRemaining);
    updateProgress(1);
    if (timerState !== 'stopped') { stopTimer(); timerState = 'stopped'; btnStartPause.textContent = '▶'; }
  });
});

customDurationInput.addEventListener('change', () => {
  const mins = parseInt(customDurationInput.value);
  if (mins > 0 && mins <= 1440) {
    document.querySelectorAll('.duration-btn').forEach(b => b.classList.remove('active'));
    timerDuration = mins * 60;
    timerRemaining = timerDuration;
    updateTimerDisplay(timerRemaining);
    updateProgress(1);
    if (timerState !== 'stopped') { stopTimer(); timerState = 'stopped'; btnStartPause.textContent = '▶'; }
  }
});

// ========== TIMER CONTROLS ==========
btnStartPause.addEventListener('click', () => {
  if (timerMode === 'countdown') {
    if (timerState === 'stopped' || timerState === 'paused') {
      startCountdown();
    } else {
      pauseTimer();
    }
  } else if (timerMode === 'stopwatch') {
    if (timerState === 'stopped' || timerState === 'paused') {
      startStopwatch();
    } else {
      pauseTimer();
    }
  }
});

btnReset.addEventListener('click', () => {
  stopTimer();
  timerState = 'stopped';
  btnStartPause.textContent = '▶';
  if (timerMode === 'countdown') {
    timerRemaining = timerDuration;
    updateTimerDisplay(timerRemaining);
    updateProgress(1);
  } else if (timerMode === 'stopwatch') {
    stopwatchElapsed = 0;
    updateTimerDisplay(0);
    updateProgress(0);
  }
});

function startCountdown() {
  timerState = 'running';
  btnStartPause.textContent = '⏸';
  timerInterval = setInterval(() => {
    timerRemaining--;
    if (timerRemaining <= 0) {
      timerRemaining = 0;
      stopTimer();
      timerState = 'stopped';
      btnStartPause.textContent = '▶';
      updateProgress(0);
      updateTimerDisplay(0);
      // Notification
      if (Notification.permission === 'granted') {
        new Notification('🍅 番茄专注', { body: '专注时间结束！休息一下吧~' });
      }
      return;
    }
    updateTimerDisplay(timerRemaining);
    updateProgress(timerRemaining / timerDuration);
  }, 1000);
}

function startStopwatch() {
  timerState = 'running';
  btnStartPause.textContent = '⏸';
  timerInterval = setInterval(() => {
    stopwatchElapsed++;
    updateTimerDisplay(stopwatchElapsed);
    // Progress completes a full circle every 60 minutes
    const progress = (stopwatchElapsed % 3600) / 3600;
    updateProgress(progress);
  }, 1000);
}

let clockInterval = null;
function startClock() {
  if (clockInterval) clearInterval(clockInterval);
  clockInterval = setInterval(updateClockDisplay, 1000);
}

function updateClockDisplay() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  timerTimeEl.textContent = `${h}:${m}:${s}`;
  // Progress based on seconds in a minute
  const progress = now.getSeconds() / 60;
  updateProgress(progress);
}

function pauseTimer() {
  timerState = 'paused';
  btnStartPause.textContent = '▶';
  clearInterval(timerInterval);
  timerInterval = null;
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  clearInterval(clockInterval);
  clockInterval = null;
}

function updateTimerDisplay(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = seconds % 60;
  if (h > 0) {
    timerTimeEl.textContent = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  } else {
    timerTimeEl.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
}

function updateProgress(fraction) {
  const circumference = 2 * Math.PI * 100; // 628.32
  const offset = circumference * (1 - fraction);
  progressCircle.style.strokeDashoffset = offset;
}

// ========== WEATHER ==========
function fetchWeather() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      const { latitude, longitude } = pos.coords;
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`)
        .then(r => r.json())
        .then(data => {
          if (data.current_weather) {
            const temp = Math.round(data.current_weather.temperature);
            const code = data.current_weather.weathercode;
            document.getElementById('weatherTemp').textContent = `${temp}°C`;
            document.querySelector('.weather-icon').textContent = getWeatherIcon(code);
          }
        }).catch(() => setMockWeather());
    }, () => setMockWeather());
  } else {
    setMockWeather();
  }
}

function setMockWeather() {
  document.getElementById('weatherTemp').textContent = '22°C';
  document.querySelector('.weather-icon').textContent = '⛅';
}

function getWeatherIcon(code) {
  if (code === 0) return '☀️';
  if (code <= 3) return '⛅';
  if (code <= 49) return '🌫️';
  if (code <= 69) return '🌧️';
  if (code <= 79) return '🌨️';
  if (code <= 99) return '⛈️';
  return '🌤️';
}

function updateDate() {
  const now = new Date();
  const days = ['周日','周一','周二','周三','周四','周五','周六'];
  const month = now.getMonth() + 1;

// ========== DYNAMIC BACKGROUND ==========
function updateBackground() {
  const hour = new Date().getHours();

  app.classList.remove('bg-morning','bg-afternoon','bg-evening','bg-night');
  if (hour >= 6 && hour < 12) app.classList.add('bg-morning');

  else if (hour >= 18 && hour < 21) app.classList.add('bg-evening');

// ========== QUOTES ==========
function updateQuote() {
  const now = new Date();
  const index = Math.floor((now.getHours() * 60 + now.getMinutes()) / 30) % quotes.length;
  if (index !== currentQuoteIndex) {
    currentQuoteIndex = index;
    document.getElementById('quoteText').textContent = quotes[index].text;
    document.getElementById('quoteAuthor').textContent = `— ${quotes[index].author}`;
  }

// ========== MARKDOWN RENDERER ==========
function renderMarkdown(text) {
  if (!text) return '';
  let html = text;

  // Escape HTML first
  html = html.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Code blocks (``` ... ```)
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, function(match, lang, code) {
    return '<pre><code>' + code.trim() + '</code></pre>';
  });

  // Split into lines for block-level processing
  const lines = html.split('\n');
  let result = [];
  let inList = false;
  let listType = '';
  let listStack = [];
  let inBlockquote = false;
  let blockquoteLines = [];

  function closeAllLists() {
    while (listStack.length > 0) {
      const t = listStack.pop();
      result.push(t === 'ul' ? '</ul>' : '</ol>');
    }
    inList = false;
  }

  function closeBlockquote() {
    if (inBlockquote) {
      result.push('<blockquote>' + renderInline(blockquoteLines.join('<br>')) + '</blockquote>');
      blockquoteLines = [];
      inBlockquote = false;
    }
  }

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Skip lines that are part of pre blocks
    if (line.match(/^&lt;pre&gt;/) || line.match(/^&lt;\/pre&gt;/)) {
      closeAllLists();
      closeBlockquote();
      result.push(line);
      continue;
    }

    // Horizontal rule
    if (line.match(/^(-{3,}|\*{3,}|_{3,})$/)) {
      closeAllLists();
      closeBlockquote();
      result.push('<hr>');
      continue;
    }

    // Headings
    const headingMatch = line.match(/^(#{1,6})\s+(.+)$/);
    if (headingMatch) {
      closeAllLists();
      closeBlockquote();
      const level = headingMatch[1].length;
      result.push(`<h${level}>${renderInline(headingMatch[2])}</h${level}>`);
      continue;
    }

    // Blockquote
    const bqMatch = line.match(/^&gt;\s?(.*)$/);
    if (bqMatch) {
      closeAllLists();
      inBlockquote = true;
      blockquoteLines.push(bqMatch[1]);
      continue;
    } else if (inBlockquote) {
      closeBlockquote();
    }

    // Task list
    const taskMatch = line.match(/^(\s*)- \[([ xX])\]\s+(.+)$/);
    if (taskMatch) {
      if (!inList || listType !== 'task') {
        closeAllLists();
        result.push('<ul class="task-list">');
        listStack.push('ul');
        inList = true;
        listType = 'task';
      }
      const checked = taskMatch[2] !== ' ' ? ' checked disabled' : ' disabled';
      result.push(`<li><input type="checkbox"${checked}><span>${renderInline(taskMatch[3])}</span></li>`);
      continue;
    }

    // Unordered list
    const ulMatch = line.match(/^(\s*)[-*+]\s+(.+)$/);
    if (ulMatch && !taskMatch) {
      closeBlockquote();
      if (!inList || listType !== 'ul') {
        closeAllLists();
        result.push('<ul>');
        listStack.push('ul');
        inList = true;
        listType = 'ul';
      }
      result.push(`<li>${renderInline(ulMatch[2])}</li>`);
      continue;
    }

    // Ordered list
    const olMatch = line.match(/^(\s*)\d+\.\s+(.+)$/);
    if (olMatch) {
      closeBlockquote();
      if (!inList || listType !== 'ol') {
        closeAllLists();
        result.push('<ol>');
        listStack.push('ol');
        inList = true;
        listType = 'ol';
      }
      result.push(`<li>${renderInline(olMatch[2])}</li>`);
      continue;
    }

    // Empty line
    if (line.trim() === '') {
      closeAllLists();
      closeBlockquote();
      continue;
    }

    // Paragraph
    closeAllLists();
    closeBlockquote();
    result.push(`<p>${renderInline(line)}</p>`);
  }

  closeAllLists();
  closeBlockquote();

  return result.join('\n');
}

function renderInline(text) {
  if (!text) return '';

  // Inline code (must be first to prevent inner processing)
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Images
  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');

  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Bold italic (must come before bold and italic)
  text = text.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');

  // Bold
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Italic
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Strikethrough
  text = text.replace(/~~(.+?)~~/g, '<del>$1</del>');

  return text;
}

// ========== TODO ==========
function renderTodos() {
  const list = document.getElementById('todoList');
  list.innerHTML = '';
  const now = new Date();
  const nowTime = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  todos.forEach((todo, i) => {
    // Backward compatibility: old todos may only have 'text' field
    const title = todo.title || todo.text || '未命名任务';
    const content = todo.content || '';
    const dueTime = todo.dueTime || '';

    const item = document.createElement('div');
    item.className = `todo-item ${todo.completed ? 'completed' : ''}`;
    item.style.animationDelay = `${i * 0.06}s`;
    item.dataset.index = i;

    let dueClass = '';
    let dueText = '';
    if (dueTime) {
      if (!todo.completed && dueTime < nowTime) {
        dueClass = 'overdue';
        dueText = `⚠️ 已超时 (${dueTime})`;
      } else if (!todo.completed) {
        dueClass = 'upcoming';
        dueText = `📅 ${dueTime}`;
      } else {
        dueText = `${dueTime}`;
      }
    }

    const renderedContent = content ? renderMarkdown(content) : '<p style="color:var(--text-secondary);font-size:12px;">暂无详细内容</p>';

    item.innerHTML = `
      <div class="todo-item-header">
        <div class="todo-checkbox ${todo.completed ? 'checked' : ''}" data-index="${i}"></div>
        <div class="todo-item-info">
          <div class="todo-item-title">${escapeHtml(title)}</div>
          ${dueTime ? `<div class="todo-item-due ${dueClass}">${dueText}</div>` : ''}
        </div>
        <span class="todo-expand-indicator">▼</span>
        <button class="todo-delete-btn" data-index="${i}">✕</button>
      </div>
      <div class="todo-item-expanded">
        <div class="todo-expanded-toolbar">
          <button class="todo-toggle-edit-btn" data-index="${i}">编辑</button>
        </div>
        <div class="todo-markdown-view">${renderedContent}</div>
        <div class="todo-edit-area">
          <textarea class="todo-edit-textarea" data-index="${i}" placeholder="支持 Markdown 语法...">${escapeHtml(content)}</textarea>
          <button class="todo-edit-save-btn" data-index="${i}">保存</button>
        </div>
      </div>
    `;
    list.appendChild(item);
  });

  document.getElementById('todoCount').textContent = `${todos.filter(t => !t.completed).length} 项`;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

document.getElementById('todoAddBtn').addEventListener('click', addTodo);
document.getElementById('todoTitleInput').addEventListener('keypress', e => {
  if (e.key === 'Enter') addTodo();
});

function addTodo() {
  const titleInput = document.getElementById('todoTitleInput');
  const contentInput = document.getElementById('todoContentInput');
  const timeInput = document.getElementById('todoTimeInput');
  const title = titleInput.value.trim();
  if (!title) return;
  todos.push({
    id: Date.now(),
    title: title,
    content: contentInput.value || '',
    dueTime: timeInput.value || '',
    completed: false
  });
  saveTodos();
  renderTodos();
  titleInput.value = '';
  contentInput.value = '';
  timeInput.value = '';
}

document.getElementById('todoList').addEventListener('click', e => {
  const checkbox = e.target.closest('.todo-checkbox');
  const deleteBtn = e.target.closest('.todo-delete-btn');
  const toggleEditBtn = e.target.closest('.todo-toggle-edit-btn');
  const saveBtn = e.target.closest('.todo-edit-save-btn');
  const header = e.target.closest('.todo-item-header');

  if (checkbox) {
    e.stopPropagation();
    const idx = parseInt(checkbox.dataset.index);
    todos[idx].completed = !todos[idx].completed;
    saveTodos();
    renderTodos();
  } else if (deleteBtn) {
    e.stopPropagation();
    const idx = parseInt(deleteBtn.dataset.index);
    todos.splice(idx, 1);
    saveTodos();
    renderTodos();
  } else if (toggleEditBtn) {
    e.stopPropagation();
    const idx = parseInt(toggleEditBtn.dataset.index);
    const item = toggleEditBtn.closest('.todo-item');
    const markdownView = item.querySelector('.todo-markdown-view');
    const editArea = item.querySelector('.todo-edit-area');
    if (editArea.style.display === 'block') {
      editArea.style.display = 'none';
      markdownView.style.display = 'block';
      toggleEditBtn.textContent = '编辑';
    } else {
      editArea.style.display = 'block';
      markdownView.style.display = 'none';
      toggleEditBtn.textContent = '查看';
    }
  } else if (saveBtn) {
    e.stopPropagation();
    const idx = parseInt(saveBtn.dataset.index);
    const item = saveBtn.closest('.todo-item');
    const textarea = item.querySelector('.todo-edit-textarea');
    todos[idx].content = textarea.value;
    saveTodos();
    // Update the rendered markdown view
    const markdownView = item.querySelector('.todo-markdown-view');
    markdownView.innerHTML = todos[idx].content ? renderMarkdown(todos[idx].content) : '<p style="color:var(--text-secondary);font-size:12px;">暂无详细内容</p>';
    // Switch back to view mode
    const editArea = item.querySelector('.todo-edit-area');
    const toggleBtn = item.querySelector('.todo-toggle-edit-btn');
    editArea.style.display = 'none';
    markdownView.style.display = 'block';
    toggleBtn.textContent = '编辑';
  } else if (header && !checkbox && !deleteBtn) {
    // Toggle expand
    const item = header.closest('.todo-item');
    item.classList.toggle('expanded');
  }
});

function saveTodos() {
  localStorage.setItem('pomodoro_todos', JSON.stringify(todos));
}

// ========== MOOD ==========
const moodEmojis = { great: '😄', good: '🙂', normal: '😐', bad: '😔', terrible: '😢' };

document.getElementById('moodSelector').addEventListener('click', e => {
  const option = e.target.closest('.mood-option');
  if (!option) return;
  const mood = option.dataset.mood;
  const today = new Date().toISOString().split('T')[0];
  moodData[today] = mood;
  localStorage.setItem('pomodoro_moods', JSON.stringify(moodData));
  document.querySelectorAll('.mood-option').forEach(o => o.classList.remove('selected'));
  option.classList.add('selected');
  renderMoodHistory();
});

function renderMoodHistory() {
  const container = document.getElementById('moodHistory');
  container.innerHTML = '';
  const dayLabels = ['日','一','二','三','四','五','六'];
  const today = new Date();

  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = d.toISOString().split('T')[0];
    const mood = moodData[key];
    const dayEl = document.createElement('div');
    dayEl.className = 'mood-day';
    dayEl.innerHTML = `
      <span class="mood-day-label">${dayLabels[d.getDay()]}</span>
      <span class="mood-day-emoji">${mood ? moodEmojis[mood] : '·'}</span>
    `;
    container.appendChild(dayEl);
  }

  // Highlight today's selected mood
  const todayKey = today.toISOString().split('T')[0];
  if (moodData[todayKey]) {
    document.querySelectorAll('.mood-option').forEach(o => {
      o.classList.toggle('selected', o.dataset.mood === moodData[todayKey]);
    });
  }
}

// ========== NOTIFICATION PERMISSION ==========
function requestNotification() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// ========== INIT ==========
function init() {
  updateDate();
  updateBackground();
  updateQuote();
  fetchWeather();
  renderTodos();
  renderMoodHistory();
  requestNotification();
  updateProgress(1);

  // Update every minute
  setInterval(() => {
    updateDate();
    updateBackground();
    updateQuote();
  }, 60000);

  // Refresh weather every 30 min
  setInterval(fetchWeather, 1800000);
}

init();

// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
